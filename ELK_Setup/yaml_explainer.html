<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
.tab-row { display: flex; border-bottom: 0.5px solid var(--color-border-tertiary); overflow-x: auto; flex-wrap: nowrap; scrollbar-width: none; }
.tab-row::-webkit-scrollbar { display: none; }
.tab { padding: 8px 11px; font-size: 11px; cursor: pointer; color: var(--color-text-secondary); border-bottom: 2px solid transparent; white-space: nowrap; flex-shrink: 0; }
.tab.active { color: var(--color-text-primary); border-bottom-color: var(--color-text-primary); font-weight: 500; }
.wrap { display: flex; min-height: 400px; }
.left { width: 52%; border-right: 0.5px solid var(--color-border-tertiary); }
.right { width: 48%; padding: 18px; }
.code-area { padding: 10px 0; font-family: var(--font-mono); font-size: 12px; line-height: 1.8; overflow-y: auto; max-height: 400px; }
.line { padding: 1px 14px; cursor: pointer; display: flex; gap: 10px; border-left: 3px solid transparent; transition: background 0.1s; }
.line:hover { background: var(--color-background-secondary); }
.line.active { background: var(--color-background-info); border-left-color: #378ADD; }
.lnum { color: var(--color-text-tertiary); min-width: 22px; text-align: right; user-select: none; font-size: 11px; padding-top: 1px; }
.lcode { color: var(--color-text-primary); white-space: pre; }
.lcode .k { color: #185FA5; }
.lcode .v { color: #3B6D11; }
.placeholder { color: var(--color-text-tertiary); font-size: 13px; padding-top: 20px; }
.info-card { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 14px 16px; border-left: 3px solid #378ADD; }
.info-card.danger { border-left-color: #E24B4A; }
.info-card.key { border-left-color: #639922; }
.info-label { font-size: 11px; font-weight: 500; color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
.info-title { font-size: 14px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 8px; }
.info-body { font-size: 13px; color: var(--color-text-secondary); line-height: 1.6; }
.info-body code { font-family: var(--font-mono); background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: 4px; padding: 1px 5px; font-size: 11px; color: var(--color-text-primary); }
.tip { margin-top: 10px; font-size: 12px; color: var(--color-text-tertiary); padding-top: 10px; border-top: 0.5px solid var(--color-border-tertiary); }
.badge { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 500; margin-bottom: 8px; }
.badge.meta { background: var(--color-background-warning); color: var(--color-text-warning); }
.badge.spec { background: var(--color-background-info); color: var(--color-text-info); }
.badge.key { background: var(--color-background-success); color: var(--color-text-success); }
.badge.danger { background: var(--color-background-danger); color: var(--color-text-danger); }
</style>

let af = 0, al = null;

function hl(code) {
  return code
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^(\s*)([\w.\-\/]+)(\s*:)(?=\s|$)/, (_,sp,k,col) => `${sp}<span class="k">${k}</span>${col}`)
    .replace(/:\s*(.+)$/, (_, v) => `: <span class="v">${v}</span>`);
}

function renderTabs() {
  document.getElementById('tabs').innerHTML = files.map((f,i) =>
    `<div class="tab ${i===af?'active':''}" onclick="sw(${i})">${f.name}</div>`
  ).join('');
}

function renderCode() {
  document.getElementById('code').innerHTML = files[af].lines.map((l,i) =>
    `<div class="line ${al===i?'active':''}" onclick="sl(${i})">
      <span class="lnum">${i+1}</span>
      <span class="lcode">${hl(l.code)}</span>
    </div>`
  ).join('');
}

function renderInfo() {
  const el = document.getElementById('info');
  if (al === null) { el.innerHTML='<p class="placeholder">Click any line to understand what it does.</p>'; return; }
  const l = files[af].lines[al];
  if (!l.info) { el.innerHTML='<p class="placeholder">Structural line — groups the settings below it.</p>'; return; }
  const d = l.info;
  const bt = { meta:'identifier', spec:'configuration', key:'important', danger:'problem' };
  const cc = d.badge==='danger'?'danger':d.badge==='key'?'key':'';
  el.innerHTML = `<div class="info-card ${cc}">
    <div class="info-label">${d.label}</div>
    ${d.badge?`<span class="badge ${d.badge}">${bt[d.badge]||d.badge}</span>`:''}
    <div class="info-title">${d.title}</div>
    <div class="info-body">${d.body}</div>
    ${d.tip?`<div class="tip">Tip: ${d.tip}</div>`:''}
  </div>`;
}

function sw(i) { af=i; al=null; renderTabs(); renderCode(); renderInfo(); }
function sl(i) { al=i; renderCode(); renderInfo(); }

renderTabs(); renderCode(); renderInfo();
</script>
