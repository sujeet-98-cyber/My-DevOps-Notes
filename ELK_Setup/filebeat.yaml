apiVersion: beat.k8s.elastic.co/v1beta1
kind: Beat
metadata:
  name: quickstart
  namespace: elk
spec:
  type: filebeat
  version: 8.13.4

  elasticsearchRef:
    name: quickstart

  kibanaRef:
    name: quickstart

  config:
    filebeat.inputs:
    - type: container
      paths:
        - /var/log/containers/*.log

      processors:
        - add_kubernetes_metadata:
            host: ${NODE_NAME}
            matchers:
              - logs_path:
                  logs_path: "/var/log/containers/"

  daemonSet:
    podTemplate:
      spec:
        serviceAccountName: filebeat

        containers:
        - name: filebeat
          securityContext:
            runAsUser: 0

          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName

          volumeMounts:
          - name: varlogcontainers
            mountPath: /var/log/containers
          - name: varlogpods
            mountPath: /var/log/pods

        volumes:
        - name: varlogcontainers
          hostPath:
            path: /var/log/containers
        - name: varlogpods
          hostPath:
            path: /var/log/pods
